<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In | MaintainSMIP</title>
    <link rel="icon" href="logo1.png" type="image/png" />
    <script src="themes.js?v=1.6.2"></script>
    <link rel="stylesheet" href="shared.css?v=1.6.2" />
    <script src="smi_events.js?v=1.6.2"></script>
    <script src="settings.js?v=1.6.2"></script>
    <style>
      .login-shell {
        min-height: calc(100vh - 48px);
        display: grid;
        place-items: center;
        padding: 24px 0;
      }

      .login-card {
        width: min(420px, 100%);
        padding: 32px;
      }

      .login-brand {
        display: flex;
        align-items: center;
        gap: 14px;
        margin-bottom: 24px;
      }

      .login-brand img {
        width: 48px;
        height: 48px;
        object-fit: contain;
      }

      .login-form {
        display: grid;
        gap: 16px;
        margin-top: 20px;
      }

      .login-error {
        color: #fca5a5;
        font-size: 0.9rem;
        min-height: 1.2em;
      }

      .login-hint {
        margin-top: 16px;
        font-size: 0.85rem;
        color: var(--muted);
        line-height: 1.45;
      }
    </style>
  </head>
  <body>
    <div class="page login-shell">
      <section class="card login-card">
        <div class="login-brand">
          <img src="logo1.png" alt="MaintainSMIP" />
          <div>
            <span class="eyebrow">Secure Access</span>
            <h2 style="margin: 6px 0 0;">MaintainSMIP</h2>
          </div>
        </div>
        <p class="hero-sub">Sign in with your username and the site password.</p>
        <form class="login-form" id="login-form">
          <div class="filter-group">
            <label for="username">Username</label>
            <input id="username" type="text" autocomplete="username" required autofocus placeholder="mike.casady" />
          </div>
          <div class="filter-group">
            <label for="password">Password</label>
            <input id="password" type="password" autocomplete="current-password" required placeholder="Site password (not the word APP_PASSWORD)" />
          </div>
          <p class="login-error" id="login-error" aria-live="polite"></p>
          <button class="btn primary" type="submit" id="login-btn">Sign In</button>
        </form>
        <p class="login-hint">
          <strong>Username</strong> is lowercase with a dot, like <code>mike.casady</code> or <code>dusty.hixson</code>.
          <strong>Password</strong> is the actual site password configured in Render — for the demo that is usually <code>WeLoveRacing!</code>, not the text <code>APP_PASSWORD</code>.
        </p>
      </section>
    </div>

    <script>
      const params = new URLSearchParams(window.location.search);
      const nextUrl = params.get('next') || '/index.html';

      document.getElementById('login-form').addEventListener('submit', async (event) => {
        event.preventDefault();
        const btn = document.getElementById('login-btn');
        const errorEl = document.getElementById('login-error');
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        btn.disabled = true;
        errorEl.textContent = '';

        try {
          const response = await fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'same-origin',
            body: JSON.stringify({ username, password }),
          });
          if (!response.ok) {
            let detail = 'Incorrect username or password.';
            try {
              const body = await response.json();
              detail = body.detail || detail;
            } catch (err) {
              /* ignore */
            }
            errorEl.textContent = `${detail} Use username mike.casady and the real site password (e.g. WeLoveRacing!).`;
            btn.disabled = false;
            return;
          }
          window.location.href = nextUrl;
        } catch (err) {
          errorEl.textContent = 'Could not reach the server. Check your connection.';
          btn.disabled = false;
        }
      });
    </script>
  </body>
</html>
