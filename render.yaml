# Render Blueprint — MaintainSMIP demo deploy
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: maintainsmip
    runtime: python
    plan: starter
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    disk:
      name: maintainsmip-data
      mountPath: /var/data
      sizeGB: 5
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: DATA_DIR
        value: /var/data
      - key: APP_PASSWORD
        sync: false
      - key: APP_SECRET
        sync: false
      - key: VAPID_EMAIL
        value: mailto:support@smiproperties.com
      - key: SEED_DEMO_DATA
        value: "false"
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: NOTIFY_EMAIL_RECIPIENTS
        sync: false